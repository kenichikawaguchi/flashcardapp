{% extends 'base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto">

    <!-- パンくずリスト -->
    <nav class="text-sm text-gray-500 mb-6">
        <a href="/" class="hover:underline">ホーム</a>
        <span class="mx-2">›</span>
        <a href="/articles/" class="hover:underline">学習記事一覧</a>
        <span class="mx-2">›</span>
        <span class="text-gray-700">{{ title }}</span>
    </nav>

    <!-- 記事本文 -->
    <article class="bg-white rounded-lg shadow p-8 mb-6 prose prose-blue max-w-none
        [&_h2]:text-xl [&_h2]:font-bold [&_h2]:text-gray-800 [&_h2]:mt-8 [&_h2]:mb-4
        [&_h3]:text-lg [&_h3]:font-bold [&_h3]:text-gray-700 [&_h3]:mt-6 [&_h3]:mb-3
        [&_p]:text-gray-700 [&_p]:leading-relaxed [&_p]:mb-4
        [&_ul]:list-disc [&_ul]:pl-6 [&_ul]:mb-4 [&_ul>li]:text-gray-700 [&_ul>li]:mb-1
        [&_ol]:list-decimal [&_ol]:pl-6 [&_ol]:mb-4 [&_ol>li]:text-gray-700 [&_ol>li]:mb-1
        [&_table]:w-full [&_table]:border-collapse [&_table]:mb-6
        [&_th]:bg-gray-100 [&_th]:border [&_th]:border-gray-300 [&_th]:px-3 [&_th]:py-2 [&_th]:text-left [&_th]:text-sm [&_th]:font-bold
        [&_td]:border [&_td]:border-gray-300 [&_td]:px-3 [&_td]:py-2 [&_td]:text-sm
        [&_hr]:my-8 [&_hr]:border-gray-200
        [&_strong]:font-bold [&_strong]:text-gray-800
        [&_code]:bg-gray-100 [&_code]:px-1 [&_code]:rounded [&_code]:text-sm">

        <!-- 公開日 -->
        <p class="text-gray-400 text-sm mb-6">📅 公開日：2026年3月20日</p>

        {{ content | safe }}
    </article>

    <!-- 関連記事 -->
    {% if related %}
    <div class="bg-white rounded-lg shadow p-6 mb-6">
        <h2 class="text-lg font-bold text-gray-800 mb-4">📚 関連記事</h2>
        <div class="space-y-3">
            {% for r in related %}
            <a href="/articles/{{ r.slug }}"
                class="block border border-gray-200 rounded-lg px-4 py-3 hover:border-blue-400 hover:bg-blue-50 transition">
                <span class="text-gray-800">{{ r.title }}</span>
            </a>
            {% endfor %}
        </div>
        <div class="mt-4 text-right">
            <a href="/articles/" class="text-blue-600 hover:underline text-sm">記事一覧をすべて見る →</a>
        </div>
    </div>
    {% endif %}

    <!-- 問題演習への導線 -->
    <div class="bg-blue-50 rounded-lg p-6 text-center">
        <p class="text-gray-700 mb-3">記事を読んだら問題演習で理解を確認しよう！</p>
        <a href="/" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 inline-block">問題演習を始める</a>
    </div>
</div>
{% endblock %}
