{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">学習記事一覧</h1>
        <p class="text-gray-600">ITパスポート・基本情報・応用情報・情報セキュリティマネジメントの頻出テーマを解説した記事です。</p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        {% for article in articles %}
        <a href="{{ url_for('main.article', slug=article.slug) }}"
            class="bg-white rounded-lg shadow hover:shadow-lg transition p-6 border border-gray-200 hover:border-blue-400 block">
            <h2 class="text-lg font-bold text-gray-800 mb-3">{{ article.title }}</h2>
            <p class="text-gray-600 text-sm mb-4 leading-relaxed">{{ article.description }}</p>
            <span class="text-blue-600 text-sm font-medium">続きを読む →</span>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
