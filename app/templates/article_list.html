{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <h1>学習記事一覧</h1>
  <p class="text-muted">応用情報技術者試験などの頻出テーマを解説した記事です。</p>
  <hr>
  <div class="row">
    {% for article in articles %}
    <div class="col-md-6 mb-4">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title">{{ article.title }}</h5>
          <p class="card-text text-muted small">{{ article.description }}</p>
          <a href="{{ url_for('main.article', slug=article.slug) }}" class="btn btn-primary btn-sm">読む</a>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
