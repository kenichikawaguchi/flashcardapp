{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow p-8">
    <h2 class="text-2xl font-bold mb-6 text-center">ログイン</h2>
    <div>
        <input name="email" type="email" placeholder="メールアドレス" class="w-full border rounded px-4 py-2 mb-4" id="email">
        <input name="password" type="password" placeholder="パスワード" class="w-full border rounded px-4 py-2 mb-6" id="password">
        <button onclick="submitLogin()" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">ログイン</button>
    </div>
    <p class="text-center mt-4 text-gray-600">アカウントをお持ちでない方は<a href="/register" class="text-blue-600 hover:underline">こちら</a></p>
</div>
<script>
function submitLogin() {
    const data = new FormData();
    data.append('email', document.getElementById('email').value);
    data.append('password', document.getElementById('password').value);
    fetch('/login', { method: 'POST', body: data })
        .then(r => r.redirected ? window.location = r.url : r.text())
}
</script>
{% endblock %}
