{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto">
    {% if question %}
    <div class="bg-white rounded-lg shadow p-8 mb-6">
        <p class="text-sm text-gray-500 mb-2">カテゴリ：{{ question.category }}</p>
        <p class="text-xl font-bold text-gray-800 mb-6">{{ question.question_text }}</p>
        <div id="answer-area" class="hidden">
            <div class="bg-green-50 border border-green-200 rounded p-4 mb-4">
                <p class="font-bold text-green-800 mb-2">答え：</p>
                <p class="text-gray-800">{{ question.answer_text }}</p>
            </div>
            {% if question.explanation %}
            <div class="bg-blue-50 border border-blue-200 rounded p-4 mb-6">
                <p class="font-bold text-blue-800 mb-2">解説：</p>
                <p class="text-gray-800">{{ question.explanation }}</p>
            </div>
            {% endif %}
            <div class="flex space-x-4">
                <form method="POST" action="/answer" class="flex-1">
                    <input type="hidden" name="question_id" value="{{ question.id }}">
                    <input type="hidden" name="is_correct" value="true">
                    <button type="submit" class="w-full bg-green-500 text-white py-3 rounded-lg hover:bg-green-600">⭕ 正解だった</button>
                </form>
                <form method="POST" action="/answer" class="flex-1">
                    <input type="hidden" name="question_id" value="{{ question.id }}">
                    <input type="hidden" name="is_correct" value="false">
                    <button type="submit" class="w-full bg-red-500 text-white py-3 rounded-lg hover:bg-red-600">❌ 不正解だった</button>
                </form>
            </div>
        </div>
        <button id="show-answer" onclick="document.getElementById('answer-area').classList.remove('hidden'); this.classList.add('hidden');"
            class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">答えを見る</button>
    </div>
    {% else %}
    <div class="text-center py-20">
        <p class="text-xl text-gray-600">問題がまだ登録されていません。</p>
    </div>
    {% endif %}
</div>
{% endblock %}
